
server.port=8081

spring.application.name=avito-backend

spring.datasource.url=jdbc:postgresql://localhost:5433/avitodb
spring.datasource.username=user
spring.datasource.password=111111
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

springdoc.swagger-ui.cors=true
springdoc.swagger-ui.allowed-origins=http://localhost:5173
springdoc.swagger-ui.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
springdoc.swagger-ui.allowed-headers=Authorization,Content-Type

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.avito=DEBUG
logging.level.org.springdoc=DEBUG

keycloak.auth-server-url=http://localhost:14082
keycloak.realm=avitorealm
keycloak.resource=avitofrontend
keycloak.public-client=true
keycloak.bearer-only=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:14082/realms/avitorealm
