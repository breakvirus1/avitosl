services:
  # База данных для приложения
  postgres:
    image: postgres:15
    container_name: avito-postgres
    environment:
      POSTGRES_DB: avitodb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 111111
      PGPORT: 5433
    ports:
       - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d avitodb -p 5433"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - avito-network

  # Eureka Server (Service Registry)
  eureka-server:
    build:
      context: ..
      dockerfile: microservices/eureka-server/Dockerfile
    container_name: avito-eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    restart: unless-stopped
    networks:
      - avito-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # API Gateway
  api-gateway:
    build:
      context: ..
      dockerfile: microservices/api-gateway/Dockerfile
    container_name: avito-api-gateway
    ports:
      - "8081:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8080
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - avito-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # User Service
  user-service:
     build:
       context: ..
       dockerfile: microservices/user-service/Dockerfile
     container_name: avito-user-service
     environment:
       SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5433/avito_user_db
       SPRING_DATASOURCE_USERNAME: user
       SPRING_DATASOURCE_PASSWORD: 111111
       SPRING_APPLICATION_NAME: user-service
       EUREKA_CLIENT_ENABLED: "true"
       EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
       KEYCLOAK_AUTH_SERVER_URL: http://avitosl-keycloak:8080
     depends_on:
       postgres:
         condition: service_healthy
       eureka-server:
         condition: service_healthy
       keycloak:
         condition: service_started
     restart: unless-stopped
     networks:
       - avito-network

  # Category Service
  category-service:
    build:
      context: ..
      dockerfile: microservices/category-service/Dockerfile
    container_name: avito-category-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5433/avito_category_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: 111111
      SPRING_APPLICATION_NAME: category-service
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - avito-network

  # Post Service
  post-service:
    build:
      context: ..
      dockerfile: microservices/post-service/Dockerfile
    container_name: avito-post-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5433/avito_post_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: 111111
      SPRING_APPLICATION_NAME: post-service
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - avito-network

  # Chat Service
  chat-service:
    build:
      context: ..
      dockerfile: microservices/chat-service/Dockerfile
    container_name: avito-chat-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5433/avito_chat_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: 111111
      SPRING_APPLICATION_NAME: chat-service
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - avito-network

  # Purchase Service
  purchase-service:
    build:
      context: ..
      dockerfile: microservices/purchase-service/Dockerfile
    container_name: avito-purchase-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5433/avito_purchase_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: 111111
      SPRING_APPLICATION_NAME: purchase-service
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - avito-network

  # База данных для Keycloak
  keycloak-db:
    image: postgres:15
    container_name: avitosl-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "14092:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - avito-network

  # Keycloak сервер
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: avitosl-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_DB_URL_PORT: 5432
      KC_DB_SCHEMA: public
      KC_BOOTSTRAP_ADMIN_USERNAME: keycloak
      KC_BOOTSTRAP_ADMIN_PASSWORD: keycloak
      KC_CORS: "true"
      KC_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      KC_CORS_ALLOWED_METHODS: GET,POST,OPTIONS,PUT,DELETE
      KC_CORS_ALLOWED_HEADERS: Authorization,Content-Type,Accept,Origin
      KC_CORS_SUPPORT_CREDENTIALS: "true"
    command: start-dev --import-realm
    volumes:
      - ./keycloak-import:/opt/keycloak/data/import
    ports:
      - "14082:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - avito-network

  # Frontend
  frontend:
    build: ../../front
    container_name: avito-frontend
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped
    networks:
      - avito-network

volumes:
  postgres_data:
  keycloak_db_data:

networks:
  avito-network:
    driver: bridge
