# Server configuration
server:
  port: 8082

# Application info
spring:
  application:
    name: category-service

  # Flyway configuration
  flyway:
    baseline-on-migrate: true

  # Cloud configuration
  cloud:
    compatibility-verifier:
      enabled: false

  # Database configuration
  datasource:
    url: jdbc:postgresql://localhost:5434/avito_category_db
    username: user
    password: 111111
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Allow circular references (if needed)
  main:
    allow-circular-references: true

# Eureka client configuration
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Logging
logging:
  level:
    com.avitosl.categoryservice: DEBUG
    feign: DEBUG

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
