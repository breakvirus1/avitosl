<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Silent Renew</title>
</head>
<body>
  <script>
    // This page is used for silent token renewal
    // It will be loaded in an iframe and automatically close
    new MutationObserver(() => {
      const message = document.querySelector('message');
      if (message) {
        window.parent.postMessage(message.textContent, 'http://localhost:5173');
      }
    }).observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
