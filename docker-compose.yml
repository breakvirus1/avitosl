version: "3.8"

services:
  # База данных для приложения
  postgres:
    image: postgres:15
    container_name: avitosl-postgres
    environment:
      POSTGRES_DB: avitodb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 111111
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d avitodb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # База данных для Keycloak
  keycloak-db:
    image: postgres:15
    container_name: avitosl-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "14092:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Keycloak сервер
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: avitosl-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_DB_URL_PORT: 5432
      KC_DB_SCHEMA: public
      KC_BOOTSTRAP_ADMIN_USERNAME: keycloak
      KC_BOOTSTRAP_ADMIN_PASSWORD: keycloak
      KC_CORS: "true"
      KC_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      KC_CORS_ALLOWED_METHODS: GET,POST,OPTIONS,PUT,DELETE
      KC_CORS_ALLOWED_HEADERS: Authorization,Content-Type,Accept,Origin
      KC_CORS_SUPPORT_CREDENTIALS: "true"
    command: start-dev
    ports:
      - "14082:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  keycloak_db_data:
